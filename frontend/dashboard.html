<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — TaskMate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-page">

  <nav class="navbar">
    <div class="logo">✅ TaskMate</div>
    <div class="nav-right">
      <span id="user-greeting">Hello, User!</span>
      <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
    </div>
  </nav>

  <main class="dashboard-main">

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-number" id="total-count">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="pending-count">0</span>
        <span class="stat-label">Pending</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="done-count">0</span>
        <span class="stat-label">Completed</span>
      </div>
    </div>

    <div class="card add-task-card">
      <h3>➕ Add New Task</h3>
      <div id="form-error" class="alert alert-error hidden"></div>

      <div class="form-row">
        <div class="form-group flex-2">
          <label for="task-title">Task Title *</label>
          <input type="text" id="task-title" placeholder="What needs to be done?" />
        </div>
        <div class="form-group flex-1">
          <label for="task-priority">Priority</label>
          <select id="task-priority">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="task-desc">Description (optional)</label>
        <input type="text" id="task-desc" placeholder="Add more details..." />
      </div>

      <button id="add-task-btn" class="btn btn-primary">Add Task</button>
    </div>

    <div class="filter-bar">
      <span>Filter:</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="high">High Priority</button>
    </div>

    <div id="tasks-container">
      <div id="loading-msg" class="text-center">Loading your tasks...</div>
    </div>

  </main>

  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>✏️ Edit Task</h3>

      <div class="form-group">
        <label for="edit-title">Title</label>
        <input type="text" id="edit-title" />
      </div>
      <div class="form-group">
        <label for="edit-desc">Description</label>
        <input type="text" id="edit-desc" />
      </div>
      <div class="form-group">
        <label for="edit-priority">Priority</label>
        <select id="edit-priority">
          <option value="low">🟢 Low</option>
          <option value="medium">🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
      </div>

      <div class="modal-buttons">
        <button id="save-edit-btn" class="btn btn-primary">Save Changes</button>
        <button id="cancel-edit-btn" class="btn btn-outline">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="dashboard.js"></script>

</body>
</html>
